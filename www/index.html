<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Biru</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222; /* Latar belakang gelap agar kalkulator menonjol */
        }

        .calculator {
            width: 100%;
            max-width: 360px;
            background-color: #ffffff;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Area Layar / Display */
        .display-container {
            height: 150px;
            background-color: #ffffff;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            color: #666;
            font-size: 24px;
            background: #eee;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
        }

        #display {
            font-size: 48px;
            color: #333;
            font-weight: 300;
            word-wrap: break-word;
            max-width: 100%;
        }

        /* Area Tombol */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        button {
            border: 1px solid #e8e8e8;
            background-color: #ffffff;
            font-size: 24px;
            color: #333;
            padding: 20px 0;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            outline: none;
        }

        button:active {
            background-color: #f0f0f0;
        }

        /* Gaya Khusus Tombol Biru */
        .btn-blue {
            background-color: #4a57a8;
            color: #ffffff;
            border-color: #5562b3;
        }

        .btn-blue:active {
            background-color: #394487;
        }

        /* Menyesuaikan ukuran font untuk tombol M */
        .btn-small-text {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <div class="delete-btn" onclick="deleteLast()">&#9003;</div>
            <div id="display">0</div>
        </div>
        <div class="keypad">
            <button class="btn-blue btn-small-text" onclick="clearDisplay()">MC</button>
            <button class="btn-blue btn-small-text" onclick="clearDisplay()">MR</button>
            <button class="btn-blue btn-small-text" onclick="clearDisplay()">M-</button>
            <button class="btn-blue btn-small-text" onclick="clearDisplay()">M+</button>

            <button class="btn-blue" onclick="clearDisplay()">C</button>
            <button class="btn-blue" onclick="toggleSign()">+/-</button>
            <button class="btn-blue" onclick="appendOperator('%')">%</button>
            <button class="btn-blue" onclick="appendOperator('/')">&divide;</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="btn-blue" onclick="appendOperator('*')">x</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="btn-blue" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="btn-blue" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('00')">00</button>
            <button onclick="appendNumber('.')">,</button>
            <button class="btn-blue" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '';

        function updateDisplay() {
            // Mengganti titik menjadi koma untuk tampilan lokal
            let displayValue = currentInput.replace(/\./g, ',');
            // Menampilkan simbol perkalian/pembagian yang lebih baik
            displayValue = displayValue.replace(/\*/g, ' x ').replace(/\//g, ' ÷ ');
            display.innerText = displayValue || '0';
        }

        function appendNumber(number) {
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            // Mencegah input operator berturut-turut
            if (currentInput === '' || /[+\-*/.]$/.test(currentInput)) return;
            currentInput += operator;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '';
            updateDisplay();
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput !== '' && !isNaN(currentInput)) {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        function calculate() {
            try {
                // Menghitung persentase secara kasar
                let calcInput = currentInput.replace(/%/g, '/100'); 
                
                // Menggunakan fungsi Function alih-alih eval untuk sedikit lebih aman
                let result = new Function('return ' + calcInput)();
                
                // Membatasi angka desimal agar tidak terlalu panjang
                if (!Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(8)); 
                }
                
                currentInput = result.toString();
                updateDisplay();
            } catch (error) {
                display.innerText = 'Error';
                currentInput = '';
            }
        }
    </script>
</body>
</html>
